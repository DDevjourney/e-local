[phases.setup]
nixPkgs = ["php84", "php84Extensions.mbstring", "php84Extensions.xml", "php84Extensions.curl", "php84Extensions.pdo", "php84Extensions.pdo_mysql", "php84Extensions.tokenizer", "php84Extensions.ctype", "php84Extensions.fileinfo"]

[phases.install]
cmds = ["php84 /nix/store/$(ls /nix/store | grep composer | head -1)/bin/composer install --optimize-autoloader --no-scripts --no-interaction"]
